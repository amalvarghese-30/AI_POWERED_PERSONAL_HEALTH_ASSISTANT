<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Recommendations - AI Health Assistant</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background: #f9f9f9;
        }

        header {
            background: #4EA685;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
        }

        header nav ul li {
            margin: 0 15px;
        }

        header nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        header nav ul li a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        main {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .recommendations {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .recommendations h1 {
            text-align: center;
            color: #4EA685;
            margin-bottom: 20px;
        }

        .recommendations form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .recommendations label {
            font-weight: bold;
            color: #555;
        }

        .recommendations input,
        .recommendations select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .recommendations input:focus,
        .recommendations select:focus {
            border-color: #4EA685;
            outline: none;
        }

        .recommendations .btn {
            padding: 10px 20px;
            background: #4EA685;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }

        .recommendations .btn:hover {
            background: #45a049;
        }

        #recommendations-result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 5px;
            color: #333;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">AI Health Assistant</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="symptom-checker.html">Symptom Checker</a></li>
                <li><a href="recommendations.html">Recommendations</a></li>
                <li><a href="reminders.html">Reminders</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login-signup.html">LOGIN</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="recommendations">
            <h1>Personalized Recommendations</h1>
            <form id="recommendations-form">
                <label for="age">Age:</label>
                <input type="number" id="age" required min="1" max="120">

                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" required min="1" max="300">

                <label for="height">Height (cm):</label>
                <input type="number" id="height" required min="50" max="300">

                <label for="fitness-level">Fitness Level:</label>
                <select id="fitness-level" required>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>

                <button type="submit" class="btn">Get Recommendations</button>
            </form>
            <div id="recommendations-result"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 AI Health Assistant. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('recommendations-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const age = document.getElementById('age').value;
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            const fitnessLevel = document.getElementById('fitness-level').value;
            const resultDiv = document.getElementById('recommendations-result');

            // Simple rule-based recommendations
            let diet = "Eat a balanced diet with fruits, vegetables, and lean proteins.";
            let fitness = "Start with 30 minutes of walking daily.";
            let mentalHealth = "Practice mindfulness and meditation for 10 minutes daily.";

            if (fitnessLevel === "intermediate") {
                fitness = "Include strength training 3 times a week.";
            } else if (fitnessLevel === "advanced") {
                fitness = "Engage in high-intensity interval training (HIIT) 4 times a week.";
            }

            resultDiv.innerHTML = `
                <h3>Your Recommendations:</h3>
                <p><strong>Diet:</strong> ${diet}</p>
                <p><strong>Fitness:</strong> ${fitness}</p>
                <p><strong>Mental Health:</strong> ${mentalHealth}</p>
            `;
        });
    </script>
</body>

</html>
